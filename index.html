<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EHB | Site Locked</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; overflow: hidden; height: 100vh; font-family: 'Segoe UI', sans-serif; }
        
        /* 🚨 Massive EHB Overlay */
        .payment-lock {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 999999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .ehb-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 150px; /* বিশাল ইএইচবি লেখা */
            color: #00ffcc;
            text-shadow: 0 0 30px #00ffcc, 0 0 60px #00ffcc;
            letter-spacing: 15px;
            animation: pulse 1.5s infinite;
        }

        .lock-msg {
            color: #fff;
            font-size: 20px;
            margin-top: 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .contact-admin {
            margin-top: 30px;
            padding: 12px 25px;
            background: #ff3b30;
            color: #fff;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="payment-lock">
        <div class="ehb-logo">EHB</div>
        <div class="lock-msg">SITE TEMPORARILY LOCKED</div>
        <p style="color: #666; font-size: 12px; margin-top: 10px;">Due to unpaid dues, this service has been suspended by the developer.</p>
        <a href="https://wa.me/8801751416755" class="contact-admin">CONTACT CEO ASIF</a>
    </div>

</body>
</html>
